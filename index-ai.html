<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">  
    <title>KairosAI</title>
    <link rel="stylesheet" href="style.css ">
</head>
<body>
<div class="container-everything">
    
    <div class="section-settings">
        <a style="float: right; padding-right: 50px; padding-top: 20px;" href="index-settings.html"><img src="img/setting.png" alt=""></a>
        
    </div>

 <div class="section-headline">
    <div class="container-text">
<h1 style="color: #6AB740;">KAIROS</h1>
<h2 style="text-align: center;color:white;font-size: 45px;font-family: 'Montserrat';">Розприділяй час правильно!</h2>
    </div>
 </div>   

 <div class="section-block">
    <h2 style="font-size: 30px; color: white; font-family: Montserrat; text-align: center; padding-top: 55px;">Додати сайт, який хочу заблокувати:</h2>
<div class="input-group mb-3" style="font-family: Montserrat; max-width: 600px; margin: 0 auto; padding-top: 25px; border-collapse: 5px;">
  <input type="text" class="form-control" placeholder="https://www.anysite.com/" style="border: 2px solid #000;">
  <button class="btn btn-dark" type="button" id="button-addon2" style="min-width: 80px;">
    Заблокувати
  </button>
</div>
 </div>

 <div class="section-blocked">
    <div class="centered-block-container" style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 50px;">
    
        <div class="block-row-transparent" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <span style="font-family: 'Montserrat';" class="block-label">Заблоковані сайти</span>
            <label class="toggle-switch">
                <input type="checkbox" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
    
        <div id="sites-list" style="color: white; font-family: 'Montserrat'; width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center;">
            </div>
    
    </div>
 </div>
</div>
<script>
    document.getElementById('button-addon2').addEventListener('click', function() {
        const input = document.querySelector('.section-block input');
        const siteUrl = input.value;
    
        if (!siteUrl) return;
    
        fetch('http://kairos.api/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ site: siteUrl })
        })
        .then(response => {
            if (response.ok) {
                alert('Сайт додано до списку блокування!');
                input.value = '';
                location.reload(); // Щоб оновити список (якщо ти його виводиш)
            }
        });
    });
    </script>
</body>
</html>

<script>
    // Функція для завантаження та відображення списку сайтів
    function loadSites() {
        fetch('http://kairos.api/get_sites')
        .then(response => response.json())
        .then(sites => {
            const list = document.getElementById('sites-list');
            list.innerHTML = ''; // Очищаємо список перед оновленням
            
            sites.forEach(site => {
                const div = document.createElement('div');
                div.textContent = site;
                // Трохи стилів для красивого списку
                div.style.padding = '15px';
                div.style.borderBottom = '1px solid #555';
                div.style.fontSize = '22px';
                list.appendChild(div);
            });
        });
    }

    // Викликаємо функцію одразу при відкритті сторінки
    loadSites();

    // Твій існуючий код для кнопки "Заблокувати"
    document.getElementById('button-addon2').addEventListener('click', function() {
        const input = document.querySelector('.section-block input');
        const siteUrl = input.value;
    
        if (!siteUrl) return;
    
        fetch('http://kairos.api/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ site: siteUrl })
        })
        .then(response => {
            if (response.ok) {
                input.value = '';
                loadSites(); // Оновлюємо список без перезавантаження всієї сторінки!
            }
        });
    });
</script>
