<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">  
<title>БАНК ЧАСУ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
        <div style="margin-top: 60px;" class="text">
            <h1 style="top:30%;font-family: 'El Messiri'; text-align: center;font-size: 70px; color: #2E2E2E;">БАНК ЧАСУ</h1>
            <p style="font-family: 'El Messiri'; text-align: center; font-size: 30px; color: #2E2E2E;">Створити запит</p>
            </div>

<div class="container text-center" style="max-width: 600px; margin-top: 50px; color: #494949;">
    <form>
        <div id="error-box" class="alert alert-danger text-center shadow-sm" 
             style="display: none; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px; padding: 10px; margin-bottom: 20px; font-weight: bold; font-family: 'Raleway';">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Назва запиту" 
                   style="background-color: transparent; border: 1px solid #494949; border-radius: 4px; padding: 10px; color: #494949;" required>
        </div>

        <div class="row mb-3">
            <div class="col-6">
                <input type="number" min="1" class="form-control" placeholder="Кількість годин" 
                       style="background-color: transparent; border: 1px solid #494949; border-radius: 4px; padding: 10px; color: #494949;" required>
            </div>
            <div class="col-6">
                <input type="text" class="form-control" placeholder="Локація" 
                       style="background-color: transparent; border: 1px solid #494949; border-radius: 4px; padding: 10px; color: #494949;" required>
            </div>
        </div>

        <div class="mb-4">
            <textarea class="form-control" rows="3" placeholder="Опис запиту" 
                      style="background-color: transparent; border: 1px solid #494949; border-radius: 4px; padding: 10px; color: #494949;" required></textarea>
        </div>

        <div class="mb-3">
            <select class="form-select" style="background-color: transparent; border: 1px solid #494949; border-radius: 4px; padding: 10px; color: #494949;" required>
                <option selected disabled>Категорія</option>
                <option value="Допомога по дому">Допомога по дому</option>
                <option value="IT та техніка">IT та техніка</option>
                <option value="Навчання">Навчання</option>
                <option value="Тварини">Тварини</option>
                <option value="Різне">Різне</option>
            </select>
        </div>

        <div class="text-center">
            <button type="submit" class="btn" 
                    style="background-color: #494949; color: white; border: none; padding: 10px 80px; font-weight: bold; font-size: 18px; font-family: 'El Messiri';">
                Далі
            </button>
        </div>
    </form>
</div>
<script src="frontend.js"></script>
</body>
